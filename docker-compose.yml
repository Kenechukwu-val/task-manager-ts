services:
  api:
    build:
      context: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/task-manager
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
