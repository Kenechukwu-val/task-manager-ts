<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Real-time Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .log { max-height: 280px; overflow-y: auto; }
    </style>
    </head>
    <body class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-5xl mx-auto px-6">
        <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold text-gray-800">Task Manager</h1>
        <div id="userInfo" class="hidden items-center gap-4">
            <span id="welcomeName" class="font-medium text-lg text-gray-700"></span>
            <button onclick="logout()" 
                    class="px-6 py-2.5 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-2xl transition">
            Logout
            </button>
        </div>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="bg-white rounded-3xl shadow-xl p-8 mb-10">
        <h2 class="text-2xl font-semibold text-center mb-6">Sign In</h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <a href="http://localhost:5000/api/auth/google"
            class="flex items-center justify-center gap-3 py-4 bg-white border-2 border-gray-200 hover:border-red-400 rounded-2xl font-medium transition-all">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="28" height="28">
            Continue with Google
            </a>
            
            <a href="http://localhost:5000/api/auth/github"
            class="flex items-center justify-center gap-3 py-4 bg-gray-900 text-white hover:bg-black rounded-2xl font-medium transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577 0-.285-.01-1.044-.015-2.049-3.338.726-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.652 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.604-.015 2.896-.015 3.286 0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            Continue with GitHub
            </a>
        </div>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
            <div class="relative flex justify-center text-sm"><span class="bg-white px-4 text-gray-500">OR</span></div>
        </div>

        <div class="space-y-5">
            <input id="email" type="email" placeholder="Email address" class="w-full px-5 py-3.5 border border-gray-300 rounded-2xl">
            <input id="password" type="password" placeholder="Password" class="w-full px-5 py-3.5 border border-gray-300 rounded-2xl">
            
            <button onclick="traditionalLogin()" 
                    class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-2xl transition">
            Login with Email & Password
            </button>
        </div>

        <p id="loginStatus" class="mt-4 text-center text-sm font-medium min-h-[24px]"></p>
        </div>

        <!-- Main App -->
        <div id="mainApp" class="hidden">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-3xl shadow">
            <h2 class="text-2xl font-semibold mb-6">Create New Task</h2>
            <div class="space-y-5">
                <input id="title" type="text" placeholder="Task Title" class="w-full px-5 py-3.5 border border-gray-300 rounded-2xl">
                <textarea id="description" placeholder="Description (optional)" rows="3" class="w-full px-5 py-3.5 border border-gray-300 rounded-2xl"></textarea>
                
                <div class="grid grid-cols-2 gap-4">
                <select id="priority" class="px-5 py-3.5 border border-gray-300 rounded-2xl">
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                    <option value="low">Low Priority</option>
                </select>
                <input id="dueDate" type="datetime-local" class="px-5 py-3.5 border border-gray-300 rounded-2xl">
                </div>

                <button onclick="createTask()" class="w-full py-4 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-2xl">
                ➕ Create Task
                </button>
            </div>
            </div>

            <div class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow">
                <h2 class="text-xl font-semibold mb-4">Live Events</h2>
                <div id="log" class="log bg-gray-900 text-green-400 p-5 rounded-2xl text-sm font-mono h-72 overflow-y-auto"></div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow">
                <h2 class="text-xl font-semibold mb-4">Your Tasks (Real-time)</h2>
                <div id="tasks" class="space-y-4 min-h-[200px]"></div>
            </div>
            </div>
        </div>
        </div>
    </div>

    <!-- Update Modal -->
    <div id="updateModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4">
        <h3 class="text-2xl font-semibold mb-6">Update Task</h3>
        <input id="editTitle" class="w-full px-5 py-3 border border-gray-300 rounded-2xl mb-4">
        <textarea id="editDescription" rows="3" class="w-full px-5 py-3 border border-gray-300 rounded-2xl mb-4"></textarea>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <select id="editPriority" class="px-5 py-3 border border-gray-300 rounded-2xl">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            </select>
            <select id="editStatus" class="px-5 py-3 border border-gray-300 rounded-2xl">
            <option value="todo">To Do</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
            </select>
        </div>

        <div class="flex gap-4">
            <button onclick="closeModal()" class="flex-1 py-3 border border-gray-300 rounded-2xl">Cancel</button>
            <button onclick="saveUpdate()" class="flex-1 py-3 bg-blue-600 text-white rounded-2xl">Save Changes</button>
        </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentToken = null;
        let currentUser = null;
        let currentEditingTaskId = null;

        function addLog(message, type = 'info') {
        const log = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const prefix = type === 'error' ? '❌' : type === 'update' ? '✏️' : '📌';
        log.innerHTML += `<div class="mb-1">[${time}] ${prefix} ${message}</div>`;
        log.scrollTop = log.scrollHeight;
        }

        // Check for token in URL (from Google/GitHub redirect)
        function checkUrlToken() {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const name = urlParams.get('name');
        const error = urlParams.get('error');

        if (error) {
            document.getElementById('loginStatus').innerHTML = 
            `<span class="text-red-600">Login failed: ${error}</span>`;
            return;
        }

        if (token) {
            // Auto-login from OAuth redirect
            currentToken = token;
            currentUser = { name: name || 'User' };

            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            
            document.getElementById('welcomeName').textContent = `Welcome, ${currentUser.name}!`;

            addLog(`✅ Logged in successfully via Social Login`);
            connectSocket();

            // Clean URL (remove token from address bar)
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        }

        // Traditional Login
        async function traditionalLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            document.getElementById('loginStatus').innerHTML = `<span class="text-red-600">Please enter email and password</span>`;
            return;
        }

        document.getElementById('loginStatus').innerHTML = "Logging in...";

        try {
            const res = await fetch('http://localhost:5000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (data.success) {
            handleSuccessfulLogin(data.token, data.user);
            } else {
            document.getElementById('loginStatus').innerHTML = `<span class="text-red-600">${data.message || 'Login failed'}</span>`;
            }
        } catch (err) {
            document.getElementById('loginStatus').innerHTML = `<span class="text-red-600">Login failed. Try again.</span>`;
        }
        }

        function handleSuccessfulLogin(token, user) {
        currentToken = token;
        currentUser = user;

        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userInfo').classList.remove('hidden');
        
        document.getElementById('welcomeName').textContent = `Welcome, ${user.name || 'User'}!`;

        document.getElementById('loginStatus').innerHTML = '';

        addLog(`✅ Logged in successfully as ${user.name || user.email}`);
        connectSocket();
        }

        function logout() {
        if (socket) {
            socket.disconnect();
            socket = null;
        }

        currentToken = null;
        currentUser = null;
        currentEditingTaskId = null;

        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        document.getElementById('log').innerHTML = '';
        document.getElementById('tasks').innerHTML = '';

        document.getElementById('mainApp').classList.add('hidden');
        document.getElementById('userInfo').classList.add('hidden');
        document.getElementById('loginSection').classList.remove('hidden');

        document.getElementById('loginStatus').innerHTML = '';

        addLog('👋 Logged out successfully');
        }

        function connectSocket() {
        if (!currentToken) return;

        if (socket) socket.disconnect();

        socket = io('http://localhost:5000', {
            auth: { token: currentToken },
            reconnection: true
        });

        socket.on('connect', () => {
            addLog('🔌 Real-time connection established');
            loadTasks();
        });

        socket.on('taskCreated', () => { addLog('New task created'); loadTasks(); });
        socket.on('taskUpdated', () => { addLog('Task updated', 'update'); loadTasks(); });
        socket.on('taskDeleted', () => { addLog('Task deleted', 'delete'); loadTasks(); });
        }

        // Create, Load, Edit, Delete functions (same as before)
        async function createTask() {
        if (!currentToken) return alert("Please login first");

        const taskData = {
            title: document.getElementById('title').value.trim(),
            description: document.getElementById('description').value.trim(),
            priority: document.getElementById('priority').value,
            dueDate: document.getElementById('dueDate').value ? new Date(document.getElementById('dueDate').value).toISOString() : null
        };

        if (!taskData.title) return alert("Title is required");

        try {
            const res = await fetch('http://localhost:5000/api/tasks', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${currentToken}`
            },
            body: JSON.stringify(taskData)
            });

            const data = await res.json();
            if (data.success) {
            addLog(`Task created: ${taskData.title}`);
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            loadTasks();
            }
        } catch (err) {
            addLog('Error creating task', 'error');
        }
        }

        async function loadTasks() {
        if (!currentToken) return;

        try {
            const res = await fetch('http://localhost:5000/api/tasks', {
            headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            const data = await res.json();

            const container = document.getElementById('tasks');
            if (data.success && data.tasks && data.tasks.length > 0) {
            container.innerHTML = data.tasks.map(task => `
                <div class="task-card bg-white p-5 border border-gray-200 rounded-2xl">
                <h3 class="font-semibold text-lg">${task.title}</h3>
                <p class="text-gray-600 text-sm mt-1">${task.description || 'No description'}</p>
                <div class="flex gap-2 mt-4">
                    <button onclick="editTask('${task._id}', '${task.title}', '${task.description || ''}', '${task.priority}', '${task.status}')" 
                            class="text-blue-600 hover:text-blue-700 text-sm font-medium">Edit</button>
                    <button onclick="deleteTask('${task._id}', '${task.title}')" 
                            class="text-red-600 hover:text-red-700 text-sm font-medium">Delete</button>
                </div>
                </div>
            `).join('');
            } else {
            container.innerHTML = `<p class="text-gray-500 text-center py-10">No tasks yet. Create one above!</p>`;
            }
        } catch (err) {
            console.error(err);
        }
        }

        function editTask(id, title, description, priority, status) {
        currentEditingTaskId = id;
        document.getElementById('editTitle').value = title;
        document.getElementById('editDescription').value = description;
        document.getElementById('editPriority').value = priority;
        document.getElementById('editStatus').value = status;
        document.getElementById('updateModal').classList.remove('hidden');
        }

        function closeModal() {
        document.getElementById('updateModal').classList.add('hidden');
        }

        async function saveUpdate() {
        if (!currentEditingTaskId || !currentToken) return;

        const updatedData = {
            title: document.getElementById('editTitle').value.trim(),
            description: document.getElementById('editDescription').value.trim(),
            priority: document.getElementById('editPriority').value,
            status: document.getElementById('editStatus').value
        };

        try {
            const res = await fetch(`http://localhost:5000/api/tasks/${currentEditingTaskId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${currentToken}`
            },
            body: JSON.stringify(updatedData)
            });

            const data = await res.json();
            if (data.success) {
            addLog('Task updated successfully', 'update');
            closeModal();
            loadTasks();
            }
        } catch (err) {
            addLog('Error updating task', 'error');
        }
        }

        async function deleteTask(id, title) {
        if (!confirm(`Delete task "${title}"?`)) return;

        try {
            const res = await fetch(`http://localhost:5000/api/tasks/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${currentToken}` }
            });

            const data = await res.json();
            if (data.success) {
            addLog(`Task "${title}" deleted`, 'delete');
            loadTasks();
            }
        } catch (err) {
            addLog('Error deleting task', 'error');
        }
        }

        // Auto-check URL for token on page load
        window.onload = checkUrlToken;
    </script>
</body>
</html>
