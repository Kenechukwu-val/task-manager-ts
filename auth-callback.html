<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            text-align: center;
            color: white;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        p {
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-size: 14px;
        }
        .debug {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Authenticating...</h1>
        <p id="status">Please wait while we set up your account</p>
        <div class="debug" id="debug"></div>
    </div>

    <script>
        console.log('Auth callback page loaded');
        console.log('Current URL:', window.location.href);
        console.log('Search params:', window.location.search);
        
        // Extract query parameters
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const success = params.get('success');
        const message = params.get('message');
        const provider = params.get('provider') || 'unknown';

        const debugDiv = document.getElementById('debug');
        debugDiv.innerHTML = `Token: ${token ? 'Present ✓' : 'Missing ✗'}<br>Success: ${success}<br>Provider: ${provider}`;

        console.log('Token:', token ? 'Present' : 'Missing');
        console.log('Success:', success);
        console.log('Provider:', provider);
        console.log('Window opener exists:', window.opener ? 'Yes' : 'No');

        // If we have a token, send it to the parent window
        if (token && success === 'true') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Login successful! Redirecting...';
            
            // Send token to parent window using postMessage
            if (window.opener) {
                try {
                    // Send to any origin since file:// has issues with origin checking
                    window.opener.postMessage({
                        type: 'AUTH_SUCCESS',
                        token: token,
                        provider: provider,
                        success: true
                    }, '*');
                    
                    console.log('Message sent to parent window');
                    
                    // Close this popup after a short delay
                    setTimeout(() => {
                        window.close();
                    }, 800);
                } catch (err) {
                    console.error('Error sending message:', err);
                }
            } else {
                console.error('No window opener found!');
                statusEl.textContent = 'Error: No parent window found. Please close this tab.';
            }
        } else {
            // Authentication failed
            const statusEl = document.getElementById('status');
            statusEl.textContent = `Authentication failed: ${message || 'Unknown error'}`;
            
            if (window.opener) {
                try {
                    window.opener.postMessage({
                        type: 'AUTH_ERROR',
                        message: message || 'Authentication failed',
                        success: false
                    }, '*');
                    
                    console.log('Error message sent to parent');
                    
                    setTimeout(() => {
                        window.close();
                    }, 2000);
                } catch (err) {
                    console.error('Error sending error message:', err);
                }
            }
        }
    </script>
</body>
</html>
